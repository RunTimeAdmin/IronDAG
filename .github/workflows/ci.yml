name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # Nightly at 4 AM UTC

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Shared setup for all jobs
defaults:
  run:
    working-directory: irondag-blockchain

jobs:
  # ── Fast gate: runs on EVERY push, must finish in <5 min ──────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            irondag-blockchain/target
          key: ${{ runner.os }}-lint-${{ hashFiles('irondag-blockchain/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: fmt
        run: cargo fmt -- --check

      - name: check
        run: cargo check --all-targets

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Unit tests: runs on EVERY push, no integration, no release build ───────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            irondag-blockchain/target
          key: ${{ runner.os }}-test-${{ hashFiles('irondag-blockchain/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-

      - name: Unit tests
        run: cargo test --lib --bins

  # ── Full gate: only on main push or PR into main ───────────────────────────
  full:
    name: Integration + Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            irondag-blockchain/target
          key: ${{ runner.os }}-full-${{ hashFiles('irondag-blockchain/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-full-

      - name: Integration tests
        run: cargo test --tests

      - name: Install cargo-audit
        working-directory: .
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  # ── Release build: manual dispatch or version tag only ────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            irondag-blockchain/target
          key: ${{ runner.os }}-release-${{ hashFiles('irondag-blockchain/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build release binary
        run: cargo build --release --bin irondagd --features kyber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: irondagd-linux-x86_64
          path: irondag-blockchain/target/release/irondagd

  # ── Nightly: slow/ignored tests ───────────────────────────────────────────
  nightly:
    name: Nightly Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            irondag-blockchain/target
          key: ${{ runner.os }}-nightly-${{ hashFiles('irondag-blockchain/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-nightly-

      - name: Slow tests
        run: cargo test -- --ignored
