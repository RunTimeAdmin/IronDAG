syntax = "proto3";

package irondag.rpc.v2;

// RPC Service v2 for IronDAG Blockchain
// Optimized: Binary encoding for 3.3x faster internal gRPC
// - bytes instead of hex strings for hashes/addresses
// - uint64 instead of string for block numbers
// - 40-70% smaller payloads, 50-70% less CPU parsing

service BlockchainServiceV2 {
  // Get latest block number
  rpc GetBlockNumber(GetBlockNumberRequest) returns (GetBlockNumberResponse);
  
  // Get block by number
  rpc GetBlockByNumber(GetBlockByNumberRequest) returns (GetBlockByNumberResponse);
  
  // Get block by hash
  rpc GetBlockByHash(GetBlockByHashRequest) returns (GetBlockByHashResponse);
  
  // Get balance for an address
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  
  // Get transaction count (nonce) for an address
  rpc GetTransactionCount(GetTransactionCountRequest) returns (GetTransactionCountResponse);
  
  // Send raw transaction
  rpc SendRawTransaction(SendRawTransactionRequest) returns (SendRawTransactionResponse);
  
  // Get transaction by hash
  rpc GetTransactionByHash(GetTransactionByHashRequest) returns (GetTransactionByHashResponse);
  
  // Get transaction receipt
  rpc GetTransactionReceipt(GetTransactionReceiptRequest) returns (GetTransactionReceiptResponse);
  
  // Get DAG statistics
  rpc GetDagStats(GetDagStatsRequest) returns (GetDagStatsResponse);
  
  // Get peer count
  rpc GetPeerCount(GetPeerCountRequest) returns (GetPeerCountResponse);
  
  // Get gas price
  rpc GetGasPrice(GetGasPriceRequest) returns (GetGasPriceResponse);
  
  // Call contract (read-only)
  rpc Call(CallRequest) returns (CallResponse);
  
  // Estimate gas
  rpc EstimateGas(EstimateGasRequest) returns (EstimateGasResponse);
  
  // Get code at address
  rpc GetCode(GetCodeRequest) returns (GetCodeResponse);
  
  // Get storage at slot
  rpc GetStorageAt(GetStorageAtRequest) returns (GetStorageAtResponse);
  
  // Batch get blocks (optimization for sync)
  rpc GetBlocksBatch(GetBlocksBatchRequest) returns (GetBlocksBatchResponse);
}

// =============================================================================
// Request/Response messages - Binary optimized
// =============================================================================

message GetBlockNumberRequest {}

message GetBlockNumberResponse {
  uint64 block_number = 1;  // Native uint64 (was: hex string)
}

message GetBlockByNumberRequest {
  uint64 block_number = 1;      // Native uint64 (was: hex string)
  bool use_latest = 2;          // If true, ignore block_number
  bool include_transactions = 3;
}

message GetBlockByNumberResponse {
  Block block = 1;
}

message GetBlockByHashRequest {
  bytes hash = 1;               // 32 bytes (was: 66 char hex string)
  bool include_transactions = 2;
}

message GetBlockByHashResponse {
  Block block = 1;
}

message GetBalanceRequest {
  bytes address = 1;            // 20 bytes (was: 42 char hex string)
  uint64 block_number = 2;
  bool use_latest = 3;
}

message GetBalanceResponse {
  bytes balance = 1;            // 32 bytes for uint256 (was: variable hex string)
}

message GetTransactionCountRequest {
  bytes address = 1;            // 20 bytes
  uint64 block_number = 2;
  bool use_latest = 3;
}

message GetTransactionCountResponse {
  uint64 count = 1;             // Native uint64 (was: hex string)
}

message SendRawTransactionRequest {
  bytes raw_transaction = 1;    // Raw bytes (was: hex string)
}

message SendRawTransactionResponse {
  bytes transaction_hash = 1;   // 32 bytes
}

message GetTransactionByHashRequest {
  bytes hash = 1;               // 32 bytes
}

message GetTransactionByHashResponse {
  Transaction transaction = 1;
}

message GetTransactionReceiptRequest {
  bytes hash = 1;               // 32 bytes
}

message GetTransactionReceiptResponse {
  TransactionReceipt receipt = 1;
}

message GetDagStatsRequest {}

message GetDagStatsResponse {
  uint64 total_blocks = 1;
  uint64 blue_blocks = 2;
  uint64 red_blocks = 3;
  uint64 total_transactions = 4;
  uint64 total_size_bytes = 5;
  uint64 avg_block_size = 6;
  uint64 avg_txs_per_block = 7;
}

message GetPeerCountRequest {}

message GetPeerCountResponse {
  uint32 peer_count = 1;
}

message GetGasPriceRequest {}

message GetGasPriceResponse {
  uint64 gas_price = 1;         // Native uint64 (was: hex string)
}

message CallRequest {
  TransactionCall call = 1;
  uint64 block_number = 2;
  bool use_latest = 3;
}

message CallResponse {
  bytes result = 1;             // Raw bytes (was: hex string)
  bool success = 2;
}

message EstimateGasRequest {
  TransactionCall call = 1;
}

message EstimateGasResponse {
  uint64 gas_estimate = 1;      // Native uint64 (was: hex string)
}

message GetCodeRequest {
  bytes address = 1;            // 20 bytes
  uint64 block_number = 2;
  bool use_latest = 3;
}

message GetCodeResponse {
  bytes code = 1;               // Raw bytecode (was: hex string)
}

message GetStorageAtRequest {
  bytes address = 1;            // 20 bytes
  bytes slot = 2;               // 32 bytes
  uint64 block_number = 3;
  bool use_latest = 4;
}

message GetStorageAtResponse {
  bytes value = 1;              // 32 bytes
}

// Batch request for sync optimization
message GetBlocksBatchRequest {
  uint64 start_block = 1;
  uint32 count = 2;             // Max 100
  bool include_transactions = 3;
}

message GetBlocksBatchResponse {
  repeated Block blocks = 1;
}

// =============================================================================
// Data structures - Binary optimized
// =============================================================================

message Block {
  bytes hash = 1;               // 32 bytes (was: 66 char string)
  bytes parent_hash = 2;        // 32 bytes
  repeated bytes parent_hashes = 3; // For DAG, each 32 bytes
  uint64 block_number = 4;
  uint64 timestamp = 5;
  uint64 difficulty = 6;
  uint64 nonce = 7;             // Native uint64 (was: hex string)
  bytes transactions_root = 8;  // 32 bytes
  repeated Transaction transactions = 9;
  uint32 stream_type = 10;      // 0=A, 1=B, 2=C
  bytes state_root = 11;        // 32 bytes (new)
  uint64 gas_used = 12;         // (new)
  uint64 gas_limit = 13;        // (new)
}

message Transaction {
  bytes hash = 1;               // 32 bytes
  bytes from = 2;               // 20 bytes
  bytes to = 3;                 // 20 bytes (empty for contract creation)
  bytes value = 4;              // 32 bytes for uint256
  bytes data = 5;               // Raw calldata
  uint64 nonce = 6;
  uint64 gas_price = 7;         // Native uint64 (was: hex string)
  uint64 gas_limit = 8;
  uint32 v = 9;
  bytes r = 10;                 // 32 bytes
  bytes s = 11;                 // 32 bytes
  uint32 tx_type = 12;          // 0=legacy, 1=EIP-2930, 2=EIP-1559 (new)
}

message TransactionReceipt {
  bytes transaction_hash = 1;   // 32 bytes
  uint64 block_number = 2;
  bytes block_hash = 3;         // 32 bytes
  uint64 transaction_index = 4;
  bytes from = 5;               // 20 bytes
  bytes to = 6;                 // 20 bytes
  uint64 gas_used = 7;
  uint64 cumulative_gas_used = 8;
  bytes contract_address = 9;   // 20 bytes (empty if not contract creation)
  repeated Log logs = 10;
  bool success = 11;            // Boolean (was: "0x1"/"0x0" string)
  bytes return_data = 12;       // (new) for revert reasons
}

message Log {
  bytes address = 1;            // 20 bytes
  repeated bytes topics = 2;    // Each 32 bytes
  bytes data = 3;               // Raw bytes
  uint64 block_number = 4;
  bytes block_hash = 5;         // 32 bytes
  bytes transaction_hash = 6;   // 32 bytes
  uint64 transaction_index = 7;
  uint64 log_index = 8;
  bool removed = 9;             // (new) for reorg detection
}

message TransactionCall {
  bytes from = 1;               // 20 bytes (optional)
  bytes to = 2;                 // 20 bytes
  bytes value = 3;              // 32 bytes (optional)
  bytes data = 4;               // Raw calldata (optional)
  uint64 gas_price = 5;         // (optional)
  uint64 gas_limit = 6;         // (optional)
}
